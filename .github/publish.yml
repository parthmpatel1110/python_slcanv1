name: Publish to PyPI

on:
  release:
    types: [published] # Triggers precisely when you click "Publish release" on github.com

jobs:
  build-n-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org # Optional: Swap with your package URL
    permissions:
      id-token: write # CRITICAL: Required for OIDC trusted publishing authentication
      contents: write # Required to allow uploading asset files back to your web release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install build --user

      - name: Build binary wheel and source tarball
        run: python -m build # This creates the dist/ folder first!

      - name: Upload binaries to the existing GitHub Release webpage
        uses: softprops/action-gh-release@v2
        with:
          files: dist/* # Safely attaches your .whl and .tar.gz files to your web release page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
