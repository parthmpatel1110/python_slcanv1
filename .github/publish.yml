name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers whenever a tag starting with 'v' is pushed (e.g., v1.0.0)

jobs:
  build-n-publish:
    name: Build and publish Python distribution to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org
    permissions:
      id-token: write # CRITICAL: Required for OIDC trusted publishing authentication
      contents: read  # Required to checkout repository code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }} # Uses the exact tag that triggered the workflow
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build tools
        run: python -m pip install build --user

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
